<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dacula Droids 8865</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { blue: '#2544c4', light: '#f8fafc', } } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <div id="nav-placeholder"></div>

    <main class="flex-grow py-16 bg-white">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <div class="text-center mb-12">
                <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight">Get in Touch</h2>
                <p class="mt-4 text-xl text-gray-600">Interested in sponsoring us, joining the team, or just want to say hi? Send us a message.</p>
            </div>

            <div class="bg-white border border-gray-200 shadow-xl rounded-3xl overflow-hidden flex flex-col md:flex-row">
                
                <div class="bg-brand-blue text-white p-10 md:w-1/3 flex flex-col justify-between">
                    <div>
                        <h3 class="text-2xl font-bold mb-6">Contact Info</h3>
                        <div class="space-y-6">
                            <div>
                                <p class="text-blue-200 text-sm font-semibold uppercase tracking-wider mb-1">Email</p>
                                <a href="mailto:info@daculadroids.com" class="hover:underline font-medium">info@daculadroids.com</a>
                            </div>
                            <div>
                                <p class="text-blue-200 text-sm font-semibold uppercase tracking-wider mb-1">Location</p>
                                <p class="font-medium leading-relaxed">Dacula High School<br>123 Broad St<br>Dacula, GA 30019</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-10 md:w-2/3 bg-gray-50">
                    <form action="#" method="POST" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="first-name" class="block text-sm font-semibold text-gray-700 mb-2">First Name</label>
                                <input type="text" id="first-name" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition" required>
                            </div>
                            <div>
                                <label for="last-name" class="block text-sm font-semibold text-gray-700 mb-2">Last Name</label>
                                <input type="text" id="last-name" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition" required>
                            </div>
                        </div>
                        
                        <div>
                            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                            <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition" required>
                        </div>
                        
                        <div>
                            <label for="message" class="block text-sm font-semibold text-gray-700 mb-2">Message</label>
                            <textarea id="message" rows="5" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand-blue focus:border-brand-blue outline-none transition" required></textarea>
                        </div>
                        
                        <button type="submit" class="w-full bg-brand-blue text-white font-bold text-lg py-4 rounded-xl hover:bg-blue-800 transition shadow-lg">Send Message</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        fetch('nav.html').then(response => response.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
            const currentPage = window.location.pathname.split("/").pop() || 'index.html';
            document.querySelectorAll('#nav-placeholder a').forEach(link => {
                if (link.getAttribute('href') === currentPage) {
                    link.className = "text-brand-blue border-b-2 border-brand-blue pb-1 transition";
                }
            });
        });
        fetch('footer.html').then(response => response.text()).then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
    </script>
</body>
</html>
